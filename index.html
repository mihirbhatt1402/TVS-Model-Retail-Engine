<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TVS Retail Engine v7.1 - TVS Motor Company</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#ffffff;color:#1E2A4A;min-height:100vh;font-size:13px}
.app-header{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 28px;background:#fff;border-bottom:1px solid #EDEFF8;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(99,102,241,.06)}
.header-left{display:flex;align-items:center;gap:14px}
.app-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;border:1px solid #EDEFF8;box-shadow:0 2px 6px rgba(99,102,241,.10);padding:5px}
.app-logo img{width:100%;height:100%;object-fit:contain}
.app-title{font-size:16.5px;font-weight:700;color:#1E2A4A;letter-spacing:-.02em}
.app-sub{font-size:10.5px;color:#8A93B8;margin-top:1px}
.main-content{padding:22px 28px;max-width:1600px;margin:0 auto}
.subtab-nav{display:flex;gap:4px;background:#F8F9FE;border:1px solid #EDEFF8;border-radius:12px;padding:5px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
.subtab-btn{padding:8px 18px;border:none;background:transparent;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:#7079A0;transition:all .18s;font-family:inherit;white-space:nowrap}
.subtab-btn.active{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 3px 10px rgba(99,102,241,.35)}
.subtab-btn:hover:not(.active){background:#EEF1FF;color:#4F46E5}
.card{background:#fff;border:1px solid #EDEFF8;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(30,41,74,.04)}
.card-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7079A0;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-hdr .card-title{margin-bottom:0}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border:1px solid #EDEFF8;border-radius:12px;padding:15px 17px;border-top:4px solid #6366F1;box-shadow:0 2px 8px rgba(30,41,74,.05);transition:transform .15s,box-shadow .15s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(99,102,241,.12)}
.kpi-grid .kpi-card:nth-of-type(4n+1){border-top-color:#6366F1}
.kpi-grid .kpi-card:nth-of-type(4n+2){border-top-color:#FB7185}
.kpi-grid .kpi-card:nth-of-type(4n+3){border-top-color:#14B8A6}
.kpi-grid .kpi-card:nth-of-type(4n+4){border-top-color:#F59E0B}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#8A93B8;font-weight:700;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#1E2A4A;font-family:'Courier New',monospace;line-height:1}
.kpi-sub{font-size:10px;color:#A4ABC9;margin-top:4px}
.stat-bar{display:flex;align-items:center;gap:16px;padding:13px 18px;background:#F8F9FE;border:1px solid #EDEFF8;border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#A4ABC9;font-weight:700}
.stat-val{font-size:16px;font-weight:800;color:#1E2A4A;font-family:'Courier New',monospace}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#A4ABC9}
.sel{padding:6px 11px;border:1px solid #E2E5F5;border-radius:8px;font-size:11.5px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;outline:none}
.sel:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.grid-wrap{overflow-x:auto;overflow-y:auto;border:1px solid #EDEFF8;border-radius:12px;max-height:560px}.grid-wrap.page-scroll{overflow-x:auto;overflow-y:auto;max-height:75vh}
.dg{border-collapse:collapse;font-size:11px;min-width:100%;background:#fff}
.dg th{background:#F8F9FE;border-bottom:2px solid #EDEFF8;border-right:1px solid #F1F2FA;padding:8px 10px;text-align:right;font-weight:700;color:#5B6390;white-space:nowrap;position:sticky;top:0;z-index:2}
.dg th.lc{text-align:left;position:sticky;top:0;left:0;z-index:4;background:#F8F9FE;border-right:2px solid #EDEFF8;min-width:200px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg td{border-bottom:1px solid #F4F5FB;border-right:1px solid #F4F5FB;padding:5px 10px;text-align:right;color:#374151;font-family:'Courier New',monospace;white-space:nowrap}
.dg td.lc{text-align:left;font-family:inherit;font-weight:500;color:#1E2A4A;position:sticky;left:0;z-index:1;background:#fff;border-right:2px solid #EDEFF8;min-width:200px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg tr:hover td{background:#F5F6FE!important}
.dg tr:hover td.lc{background:#F5F6FE!important}
.dg tfoot td{background:#1E2A4A!important;color:#fff;font-weight:700;border-color:#2D3A63;position:sticky;bottom:0;z-index:2}
.dg tfoot td.lc{background:#1E2A4A!important;position:sticky;bottom:0;left:0;z-index:3}
.tr-state td{background:#EEF1FF!important;cursor:pointer;user-select:none}
.tr-state td.lc{background:#EEF1FF!important;font-weight:700;color:#1E2A4A}
.tr-state:hover td{background:#E0E5FF!important}
.tr-state:hover td.lc{background:#E0E5FF!important}
.tr-model td{background:#fff}
.tr-model td.lc{background:#fff;padding-left:28px;color:#374151;font-size:10.5px}
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{position:relative;height:250px}
@media(max-width:900px){.chart-pair{grid-template-columns:1fr}}
.signal-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#5B6390;padding:11px 15px;background:#F8F9FE;border-radius:10px;border:1px solid #EDEFF8;margin-bottom:12px}
.sig-item{display:flex;align-items:center;gap:5px}
.sig-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;background:#EEF1FF;color:#4F46E5}
.tag-amber{background:#FFF8EC;color:#B45309}
.tag-green{background:#EFFCF6;color:#0F8A5F}
.tag-rose{background:#FFF0F2;color:#E11D48}
.data-label{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:#EFFCF6;border:1px solid #B9F0D8;border-radius:8px;font-size:11px;font-weight:700;color:#0F8A5F}
.warn-banner{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:#FFF8EC;border:1px solid #FBE3B0;border-radius:12px;margin-bottom:16px;font-size:12px;color:#92400E;line-height:1.5}
.warn-banner b{color:#7C2D12}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease both}
.btn-export{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid #6366F1;border-radius:8px;background:#EEF1FF;color:#4F46E5;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:auto;flex-shrink:0}
.btn-export:hover{background:#6366F1;color:#fff;box-shadow:0 3px 8px rgba(99,102,241,.3)}
</style>

function moKey(s){var p=String(s||'').split("'");if(p.length===2){var i=MN.indexOf(p[0]);if(i>=0)return parseInt('20'+p[1])*12+i;}return -1;}
function Nf(n){return n?(Number(n)||0).toLocaleString('en-IN'):'-';}
function Nfw(n){return (Number(n)||0).toLocaleString('en-IN');}
function clamp01(v){return Math.max(0,Math.min(1,isFinite(v)?v:0));}
function moToQuarter(mo){
  var p=mo.match(/(\w+)'(\d+)/);if(!p)return null;
  var idx=MN.indexOf(p[1]),yr=parseInt(p[2]);
  var fy=(idx>=3)?(2000+yr+1):(2000+yr);
  var q=(idx>=3&&idx<=5)?1:(idx>=6&&idx<=8)?2:(idx>=9)?3:4;
  return 'Q'+q+'-FY'+fy;
}

}

/* -- ENGINE: Segment-Share Waterfall (VAHAN -> Segment -> Model) -------- */
var ENGINE=(function(){
'use strict';
var SEGMENTS=['Scooter','Motorcycle','Moped'];

/* ---- SIAM Model-wise Pan-India monthly wholesale ---- */
var modelSeg={},modelWsAgg={};
MRE_MODEL_WS.forEach(function(r){
  modelSeg[r.mod]=r.seg;
  if(!modelWsAgg[r.mod])modelWsAgg[r.mod]={};
  modelWsAgg[r.mod][r.mo]=(modelWsAgg[r.mod][r.mo]||0)+r.ws;
});
var allModels=Object.keys(modelSeg);
var allModelWsMos=Array.from(new Set(MRE_MODEL_WS.map(function(r){return r.mo;}))).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(a)-moKey(b);});

/* National monthly segment totals (FB2 proxy + model-share denominator) */
var natSegMo={};
allModelWsMos.forEach(function(mo){
  natSegMo[mo]={Scooter:0,Motorcycle:0,Moped:0};
  allModels.forEach(function(mod){
    var seg=modelSeg[mod];
    natSegMo[mo][seg]=(natSegMo[mo][seg]||0)+((modelWsAgg[mod]&&modelWsAgg[mod][mo])||0);
  });
});

/* Model share within segment, monthly, Pan-India (Table-3 logic) */
var modelShr={};
allModelWsMos.forEach(function(mo){
  modelShr[mo]={};
  allModels.forEach(function(mod){
    var seg=modelSeg[mod];
    var segTot=natSegMo[mo][seg]||0;
    var ws=(modelWsAgg[mod]&&modelWsAgg[mod][mo])||0;
    modelShr[mo][mod]=segTot>0?ws/segTot:0;
  });
});

/* Proxy month for VHN months beyond model-wholesale coverage (e.g. May'26 -> Apr'26) */
var modelWsMoSet=new Set(allModelWsMos);
function getProxyModelMo(mo){
  if(modelWsMoSet.has(mo))return mo;
  var k=moKey(mo),best=null,bestK=-1;
  for(var i=0;i<allModelWsMos.length;i++){var mk=moKey(allModelWsMos[i]);if(mk<=k&&mk>bestK){bestK=mk;best=allModelWsMos[i];}}
  return best;
}

/* ---- SIAM State-wise quarterly segment wholesale (Table-2 logic) ---- */
var stateQSeg={},stateQList={};
MRE_STATE_SEG_WS.forEach(function(r){
  if(!stateQSeg[r.st])stateQSeg[r.st]={};
  if(!stateQSeg[r.st][r.q])stateQSeg[r.st][r.q]={Scooter:0,Motorcycle:0,Moped:0};
  stateQSeg[r.st][r.q][r.seg]=(stateQSeg[r.st][r.q][r.seg]||0)+r.ws;
});
function qKey(q){var m=q.match(/Q(\d)-FY(\d+)/);return m?(+m[2])*10+(+m[1]):0;}
Object.keys(stateQSeg).forEach(function(st){
  stateQList[st]=Object.keys(stateQSeg[st]).filter(function(q){
    var d=stateQSeg[st][q];return (d.Scooter+d.Motorcycle+d.Moped)>0;
  }).sort(function(a,b){return qKey(a)-qKey(b);});
});
var allStateQuarters=Array.from(new Set(MRE_STATE_SEG_WS.map(function(r){return r.q;}))).sort(function(a,b){return qKey(a)-qKey(b);});

/* ---- VAHAN monthly retail (ALL FUEL) ---- */
var vhnAgg={};
MRE_VHN.forEach(function(r){
  if(!vhnAgg[r.st])vhnAgg[r.st]={};
  vhnAgg[r.st][r.mo]=(vhnAgg[r.st][r.mo]||0)+r.r;
});
var allVhnSts=Array.from(new Set(MRE_VHN.map(function(r){return r.st;}))).sort();
var allVhnMos=Array.from(new Set(MRE_VHN.map(function(r){return r.mo;}))).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(a)-moKey(b);});

/* ---- Segment share resolution ----
   FB1: exact-quarter state segment wholesale (Table-2 mapped via fiscal quarter)
   FB1b: state has data, but not for this quarter -> use state's latest available quarter
   FB2: state has zero segment wholesale in every quarter -> national (Pan-India) segment mix proxy */
function getSegShare(st,mo){
  var q=moToQuarter(mo);
  var tier,segWs;
  var qlist=stateQList[st]||[];
  if(q&&stateQSeg[st]&&stateQSeg[st][q]&&(stateQSeg[st][q].Scooter+stateQSeg[st][q].Motorcycle+stateQSeg[st][q].Moped)>0){
    segWs=stateQSeg[st][q];tier='FB1 Exact Quarter ('+q+')';
  }else if(qlist.length){
    var mk=q?qKey(q):Infinity,best=null,bestK=-1;
    qlist.forEach(function(qq){var kk=qKey(qq);if(kk<=mk&&kk>bestK){bestK=kk;best=qq;}});
    if(!best)best=qlist[qlist.length-1];
    segWs=stateQSeg[st][best];tier='FB1b Latest Available Quarter ('+best+')';
  }else{
    var pMo=getProxyModelMo(mo);
    segWs=natSegMo[pMo]||{Scooter:0,Motorcycle:0,Moped:0};
    tier='FB2 National Proxy ('+pMo+')';
  }
  var tot=(segWs.Scooter||0)+(segWs.Motorcycle||0)+(segWs.Moped||0);
  var share={};
  SEGMENTS.forEach(function(s){share[s]=tot>0?(segWs[s]||0)/tot:0;});
  return{share:share,tier:tier,q:q,segWs:segWs};
}

/* ---- Segment-level retail: state x month (Table-1 logic) ---- */
var segRetail={},segTier={},segShareCache={};
allVhnSts.forEach(function(st){
  segRetail[st]={};segTier[st]={};segShareCache[st]={};
  allVhnMos.forEach(function(mo){
    var vTotal=(vhnAgg[st]&&vhnAgg[st][mo])||0;
    var res=getSegShare(st,mo);
    segTier[st][mo]=res.tier;
    segShareCache[st][mo]=res.share;
    segRetail[st][mo]={};
    SEGMENTS.forEach(function(s){segRetail[st][mo][s]=vTotal*res.share[s];});
  });
});

/* ---- Data completeness audit: months with an actual VAHAN row vs full
   expected coverage (allVhnMos.length). Flags source-data gaps (e.g. a
   state missing most months) so they are surfaced, not silently absorbed
   into a misleadingly low predicted total. ---- */
var vhnMoCount={};
MRE_VHN.forEach(function(r){
  if(!vhnMoCount[r.st])vhnMoCount[r.st]={};
  vhnMoCount[r.st][r.mo]=true;
});
var dataCompleteness={};
allVhnSts.forEach(function(st){
  var have=vhnMoCount[st]?Object.keys(vhnMoCount[st]).length:0;
  dataCompleteness[st]={have:have,expected:allVhnMos.length,pct:have/allVhnMos.length};
});

/* ---- Model-level retail: state x month x model (Table-4 logic) ----
   Largest-remainder rounding per segment so model sub-totals tie exactly to
   the rounded segment retail. TVS XL is reclassified Moped (not Motorcycle
   as mislabeled in the source file) - verified by exact quarter-level match
   against the SIAM state-wise Moped wholesale total across all 8 overlapping
   quarters - so it receives 100% of each state-month's Moped retail. */
var predRet={};
allVhnSts.forEach(function(st){
  predRet[st]={};
  allVhnMos.forEach(function(mo){
    predRet[st][mo]={};
    var pMo=getProxyModelMo(mo);
    var mShr=modelShr[pMo]||{};
    SEGMENTS.forEach(function(seg){
      var segModels=allModels.filter(function(m){return modelSeg[m]===seg;});
      var segTotal=segRetail[st][mo][seg]||0;
      var shrTotal=segModels.reduce(function(s,m){return s+(mShr[m]||0);},0);
      var floatAlloc={},floors={},floorSum=0;
      segModels.forEach(function(m){
        var w=shrTotal>0?(mShr[m]||0)/shrTotal:1/segModels.length;
        floatAlloc[m]=segTotal*w;
        floors[m]=Math.floor(floatAlloc[m]);
        floorSum+=floors[m];
      });
      var remainder=Math.round(segTotal)-floorSum;
      var fracs=segModels.map(function(m){return{m:m,f:floatAlloc[m]-floors[m]};}).sort(function(a,b){return b.f-a.f;});
      var result={};segModels.forEach(function(m){result[m]=floors[m];});
      for(var i=0;i<remainder&&i<fracs.length;i++){result[fracs[i].m]++;}
      segModels.forEach(function(m){predRet[st][mo][m]=result[m];});
    });
  });
});

return{
  SEGMENTS:SEGMENTS,
  allModels:allModels,modelSeg:modelSeg,allModelWsMos:allModelWsMos,modelWsAgg:modelWsAgg,
  natSegMo:natSegMo,modelShr:modelShr,getProxyModelMo:getProxyModelMo,
  stateQSeg:stateQSeg,stateQList:stateQList,allStateQuarters:allStateQuarters,qKey:qKey,
  vhnAgg:vhnAgg,allVhnSts:allVhnSts,allVhnMos:allVhnMos,
  getSegShare:getSegShare,segRetail:segRetail,segTier:segTier,segShareCache:segShareCache,
  predRet:predRet,dataCompleteness:dataCompleteness
};
})();

function yearOf(mo){var p=mo.match(/(\w+)'(\d+)/);return p?'20'+p[2]:null;}

function DataGapBanner(){
  var{dataCompleteness,allVhnMos}=ENGINE;
  var gaps=Object.keys(dataCompleteness).map(function(st){return{st:st,d:dataCompleteness[st]};}).filter(function(x){return x.d.pct<0.9;}).sort(function(a,b){return a.d.pct-b.d.pct;});
  if(!gaps.length)return null;
  return ce('div',{className:'warn-banner'},
    ce('span',{style:{fontSize:16}},'⚠️'),
    ce('div',null,
      ce('b',null,'Source data gap detected: '),
      gaps.map(function(g,i){return(i>0?', ':'')+g.st+' ('+g.d.have+'/'+g.d.expected+' months)';}).join(''),
      '. VAHAN retail rows are missing for most months in '+(gaps.length>1?'these states':'this state')+' in the source file (not a calculation issue) — predicted totals for '+(gaps.length>1?'them':'it')+' will read artificially low. Verify source file coverage before presenting state-level figures for '+(gaps.length>1?'these states':'this state')+'.'
    )
  );
}

/* ============ TAB 1: VAHAN Retail (ALL FUEL) ============ */
function VahanRetailTab(){
  var{vhnAgg,allVhnSts,allVhnMos}=ENGINE;
  var[selYear,setSelYear]=useState('All');
  var years=useMemo(function(){var s=new Set();allVhnMos.forEach(function(m){s.add(yearOf(m));});return['All'].concat(Array.from(s).sort().reverse());},[]);
  var filtMos=useMemo(function(){var base=allVhnMos.slice().reverse();return selYear==='All'?base:base.filter(function(m){return yearOf(m)===selYear;});},[selYear]);
  var totalRt=useMemo(function(){return allVhnSts.reduce(function(s,st){return s+allVhnMos.reduce(function(s2,mo){return s2+((vhnAgg[st]&&vhnAgg[st][mo])||0);},0);},0);},[]);
  var colTotals=useMemo(function(){var t={};filtMos.forEach(function(mo){t[mo]=allVhnSts.reduce(function(s,st){return s+((vhnAgg[st]&&vhnAgg[st][mo])||0);},0);});return t;},[filtMos]);

  function doExport(){
    var header=['State'].concat(filtMos).concat(['Total']);
    var rows=[header];
    allVhnSts.forEach(function(st){
      var vals=filtMos.map(function(mo){return(vhnAgg[st]&&vhnAgg[st][mo])||0;});
      var tot=vals.reduce(function(a,b){return a+b;},0);
      if(!tot)return;
      rows.push([st].concat(vals).concat([tot]));
    });
    var panVals=filtMos.map(function(mo){return colTotals[mo]||0;});
    rows.push(['Pan India'].concat(panVals).concat([panVals.reduce(function(a,b){return a+b;},0)]));
    downloadCSV('TVS_Vahan_Retails_AllFuel.csv',rows);
  }

  return ce('div',{className:'fade-up'},

  var{allVhnSts,allVhnMos,vhnAgg,getSegShare,segRetail,segTier,allModels,modelSeg,modelShr,getProxyModelMo,predRet,SEGMENTS}=ENGINE;
  var[selSt,setSelSt]=useState(allVhnSts[0]||'');
  var[selMo,setSelMo]=useState(allVhnMos[allVhnMos.length-1]||'');
  var revMos=useMemo(function(){return allVhnMos.slice().reverse();},[]);

  var vTotal=(vhnAgg[selSt]&&vhnAgg[selSt][selMo])||0;
  var res=useMemo(function(){return getSegShare(selSt,selMo);},[selSt,selMo]);
  var pMo=useMemo(function(){return getProxyModelMo(selMo);},[selMo]);
  var segRet=segRetail[selSt][selMo];
  var tier=segTier[selSt][selMo];

  var modelRows=useMemo(function(){
    return allModels.map(function(mod){
      var seg=modelSeg[mod];
      var shr=(modelShr[pMo]&&modelShr[pMo][mod])||0;
      var pred=(predRet[selSt]&&predRet[selSt][selMo]&&predRet[selSt][selMo][mod])||0;
      return{mod:mod,seg:seg,shr:shr,pred:pred};
    });
  },[selSt,selMo]);

  var totalPred=modelRows.reduce(function(s,r){return s+r.pred;},0);

  function tierClass(t){
    if(t.indexOf('FB1 Exact')===0)return{background:'#f0fdf4',color:'#166534'};
    if(t.indexOf('FB1b')===0)return{background:'#fffbeb',color:'#b45309'};
    return{background:'#fef2f2',color:'#b42318'};
  }

  return ce('div',{className:'fade-up'},
    ce('div',{className:'card',style:{marginBottom:16}},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Select State + Month to Trace'),
        ce('span',{className:'filter-label'},'State'),
        ce(FilterSel,{value:selSt,onChange:setSelSt,options:allVhnSts}),
        ce('span',{className:'filter-label'},'Month'),
        ce(FilterSel,{value:selMo,onChange:setSelMo,options:revMos})
      ),
      ce('div',{className:'signal-row'},
        ce('div',{className:'sig-item'},ce('span',null,'Fiscal Quarter Mapped: '),ce('strong',null,res.q||'—')),
        ce('div',{className:'sig-item'},ce('span',null,'Proxy Model-WS Month: '),ce('strong',null,pMo)),
        ce('div',{className:'sig-item'},ce('span',{className:'badge',style:tierClass(tier)},tier))
      )
    ),
    ce('div',{className:'kpi-grid'},
      [{l:'VAHAN Total (All Fuel)',v:Nf(vTotal),s:selSt+' · '+selMo},
       {l:'Scooter Share',v:(res.share.Scooter*100).toFixed(2)+'%',s:'Retail: '+Nf(Math.round(segRet.Scooter))},
       {l:'Motorcycle Share',v:(res.share.Motorcycle*100).toFixed(2)+'%',s:'Retail: '+Nf(Math.round(segRet.Motorcycle))},
       {l:'Moped Share',v:(res.share.Moped*100).toFixed(2)+'%',s:'Retail: '+Nf(Math.round(segRet.Moped))+' (TVS XL)'}]
      .map(function(k){return ce('div',{key:k.l,className:'kpi-card'},ce('div',{className:'kpi-label'},k.l),ce('div',{className:'kpi-value'},k.v),ce('div',{className:'kpi-sub'},k.s));})
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},ce('div',{className:'card-title'},'Model-Level Trace · Pan-India Monthly Model Share × Derived Segment Retail')),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc'},'Model'),ce('th',null,'Segment'),ce('th',null,'Model Share (Pan-India, '+pMo+')'),ce('th',null,'Predicted Retail')
          )),
          ce('tbody',null,modelRows.map(function(r){
            return ce('tr',{key:r.mod},
              ce('td',{className:'lc'},r.mod),
              ce('td',null,ce('span',{className:'badge',style:{background:r.seg==='Scooter'?'#EEF1FF':r.seg==='Motorcycle'?'#FFF0F2':'#FFF8EC',color:r.seg==='Scooter'?'#4F46E5':r.seg==='Motorcycle'?'#E11D48':'#B45309'}},r.seg)),
              ce('td',null,(r.shr*100).toFixed(2)+'%'),
              ce('td',{style:{fontWeight:600}},r.pred?Nf(r.pred):'—')
            );
          })),
          ce('tfoot',null,ce('tr',null,ce('td',{className:'lc'},'Total (All Models)'),ce('td',null,'—'),ce('td',null,'—'),ce('td',null,Nf(totalPred))))
        )
      )
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},ce('div',{className:'card-title'},'Validation Checks')),
      ce('table',{className:'dg',style:{width:'100%'}},
        ce('tbody',null,
          [
            {label:'Segment shares sum to 100%?',ok:Math.abs(res.share.Scooter+res.share.Motorcycle+res.share.Moped-1)<0.001,val:((res.share.Scooter+res.share.Motorcycle+res.share.Moped)*100).toFixed(2)+'%'},
            {label:'Predicted (all models) ≈ Segment retail (all segments)?',ok:Math.abs(totalPred-Math.round(segRet.Scooter+segRet.Motorcycle+segRet.Moped))<=3,val:Nf(totalPred)+' vs '+Nf(Math.round(segRet.Scooter+segRet.Motorcycle+segRet.Moped))},
            {label:'Moped retail allocated to TVS XL',ok:true,val:Nf(Math.round(segRet.Moped))},
            {label:'Fallback tier used',ok:tier.indexOf('FB2')!==0,val:tier}
          ].map(function(c,i){
            return ce('tr',{key:i},
              ce('td',{className:'lc',style:{width:'55%'}},c.label),
              ce('td',{style:{textAlign:'left',color:c.ok?'#166534':'#b42318',fontWeight:600}},c.ok?'✓ ':'⚠ ',c.val)
            );
          })
        )
      )
    )
  );
}
