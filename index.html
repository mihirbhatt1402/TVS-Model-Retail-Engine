<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TVS Retail Engine - TVS Motor Company</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f6fa;color:#1e293b;min-height:100vh;font-size:13px}
.app-header{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 28px;background:#fff;border-bottom:1px solid #e4e6ef;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.header-left{display:flex;align-items:center;gap:14px}
.app-logo{width:36px;height:36px;background:linear-gradient(135deg,#002B5B,#E8001A);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.app-title{font-size:16px;font-weight:700;color:#1e293b;letter-spacing:-.02em}
.app-sub{font-size:10.5px;color:#6b7280;margin-top:1px}
.main-content{padding:22px 28px;max-width:1600px;margin:0 auto}
.subtab-nav{display:flex;gap:4px;background:#fff;border:1px solid #e4e6ef;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
.subtab-btn{padding:7px 16px;border:none;background:transparent;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:#6b7280;transition:all .15s;font-family:inherit;white-space:nowrap}
.subtab-btn.active{background:#1e293b;color:#fff;font-weight:600}
.subtab-btn:hover:not(.active){background:#f0f2f7;color:#1e293b}
.card{background:#fff;border:1px solid #e4e6ef;border-radius:10px;padding:16px;margin-bottom:16px}
.card-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-hdr .card-title{margin-bottom:0}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid #e4e6ef;border-radius:8px;padding:14px 16px;border-top:3px solid #2563eb}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;font-weight:600;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#1e293b;font-family:'Courier New',monospace;line-height:1}
.kpi-sub{font-size:10px;color:#94a3b8;margin-top:4px}
.stat-bar{display:flex;align-items:center;gap:16px;padding:12px 16px;background:#f8fafc;border:1px solid #e4e6ef;border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;font-weight:600}
.stat-val{font-size:16px;font-weight:700;color:#1e293b;font-family:'Courier New',monospace}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af}
.sel{padding:5px 10px;border:1px solid #e4e6ef;border-radius:6px;font-size:11.5px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;outline:none}
.sel:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.grid-wrap{border:1px solid #e4e6ef;border-radius:8px;width:100%;overflow-x:auto}
.dg thead th{position:sticky;top:0;z-index:2}
.dg th.lc{position:sticky;top:0;left:0;z-index:3}
.dg td.lc{position:sticky;left:0;z-index:1}
.dg{border-collapse:collapse;font-size:11px;min-width:100%;background:#fff}
.dg th{background:#f8fafc;border-bottom:2px solid #e2e8f0;border-right:1px solid #eaecf0;padding:7px 10px;text-align:right;font-weight:600;color:#374151;white-space:nowrap;position:sticky;top:0;z-index:2}
.dg th.lc{text-align:left;position:sticky;top:0;left:0;z-index:3;background:#f8fafc;border-right:2px solid #e2e8f0;min-width:160px}
.dg td{border-bottom:1px solid #f0f2f7;border-right:1px solid #f0f2f7;padding:5px 10px;text-align:right;color:#374151;font-family:'Courier New',monospace;white-space:nowrap}
.dg td.lc{text-align:left;font-family:inherit;font-weight:500;color:#1e293b;position:sticky;left:0;z-index:1;background:inherit;border-right:2px solid #e2e8f0}
.dg tbody tr:hover td{background:#f8fafc!important}
.dg tfoot td{background:#1e293b!important;color:#fff;font-weight:700;border-color:#374151}
.dg tfoot td.lc{background:#1e293b!important;position:sticky;left:0;z-index:1}
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{position:relative;height:250px}
@media(max-width:900px){.chart-pair{grid-template-columns:1fr}}
.var-good{color:#166534;font-weight:700}
.var-ok{color:#a16207;font-weight:600}
.var-bad{color:#dc2626;font-weight:700}
.signal-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b;padding:10px 14px;background:#f8fafc;border-radius:7px;border:1px solid #e4e6ef;margin-bottom:12px}
.sig-item{display:flex;align-items:center;gap:5px}
.sig-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:#eff6ff;color:#2563eb}
.tag-amber{background:#fffbeb;color:#b45309}
.tag-green{background:#f0fdf4;color:#166534}
.helper{font-size:11px;color:#94a3b8;padding:4px 0}
.data-label{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;font-size:11px;font-weight:600;color:#15803d}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease both}
</style>

/* ── UTILS ─────────────────────────────────────────────────────── */
function moKey(s){
  var p=String(s||'').split("'");
  if(p.length===2){var i=MN.indexOf(p[0]);if(i>=0)return parseInt('20'+p[1])*12+i;}
  return -1;
}
function Nf(n){return n?(Number(n)||0).toLocaleString('en-IN'):'-';}
function Nfw(n){return (Number(n)||0).toLocaleString('en-IN');}
function clamp01(v){return Math.max(0,Math.min(1,isFinite(v)?v:0));}
function mkChart(ref,id,cfg){
  var c=document.getElementById(id);if(!c)return;
  if(ref.current){try{ref.current.destroy();}catch(e){}ref.current=null;}
  try{ref.current=new Chart(c,cfg);}catch(e){console.error('[Chart]',e.message);}
}

function FilterSel({label,value,onChange,options}){
  return ce('div',{className:'filter-row',style:{gap:6}},
    ce('span',{className:'filter-label'},label),
    ce('select',{className:'sel',value,onChange:function(e){onChange(e.target.value);}},
      options.map(function(o){
        var v=typeof o==='string'?o:o.value;
        var lbl=typeof o==='string'?o:o.label;
        return ce('option',{key:v,value:v},lbl);
      })
    )
  );
}

function GridTable({rows,cols,data,footerLabel,footerData}){
  return ce('div',{className:'grid-wrap'},
    ce('table',{className:'dg'},
      ce('thead',null,ce('tr',null,
        ce('th',{className:'lc'},rows.label||''),
        cols.map(function(c){return ce('th',{key:c.id},c.label);}),
        ce('th',null,'Total')
      )),
      ce('tbody',null,
        rows.map(function(r,ri){
          var bg=ri%2===0?'#fff':'#f8fafc';
          var rowTot=cols.reduce(function(s,c){return s+((data[r.id]||{})[c.id]||0);},0);
          return ce('tr',{key:r.id,style:{background:bg}},
            ce('td',{className:'lc',style:{background:bg}},r.label),
            cols.map(function(c){var v=(data[r.id]||{})[c.id]||0;return ce('td',{key:c.id,style:{color:v?'inherit':'#d1d5db'}},v?Nf(v):'-');}),
            ce('td',{style:{fontWeight:600,color:'#2563eb'}},Nf(rowTot))
          );
        })
      ),
      ce('tfoot',null,ce('tr',null,
        ce('td',{className:'lc'},footerLabel||'Total'),
        cols.map(function(c){return ce('td',{key:c.id},Nf((footerData||{})[c.id]||0));}),
        ce('td',null,Nfw(cols.reduce(function(s,c){return s+((footerData||{})[c.id]||0);},0)))
      ))
    )
  );
}

/* ── Searchable dropdown ──────────────────────────────────────────── */
function SearchableSelect({value,onChange,options,placeholder}){
  var[open,setOpen]=useState(false);
  var[query,setQuery]=useState('');
  var inputRef=useRef(null);
  var filtered=useMemo(function(){
    var q=query.trim().toLowerCase();
    return q?options.filter(function(o){return o.label.toLowerCase().indexOf(q)!==-1;}):options;
  },[query,options]);
  var selected=options.find(function(o){return o.value===value;});
  return ce('div',{style:{position:'relative',display:'inline-block'}},
    ce('input',{ref:inputRef,type:'text',
      value:open?query:(selected?selected.label:(placeholder||'')),
      placeholder:placeholder||'Search...',
      onFocus:function(){setOpen(true);setQuery('');},
      onBlur:function(){setTimeout(function(){setOpen(false);setQuery('');},160);},
      onChange:function(e){setQuery(e.target.value);},
      style:{padding:'5px 10px',border:'1px solid #e4e6ef',borderRadius:6,fontSize:11.5,
        width:200,fontFamily:'inherit',outline:'none',background:'#fff',cursor:'text',color:'#374151'}
    }),
    open&&ce('div',{style:{position:'absolute',top:'calc(100% + 2px)',left:0,background:'#fff',
      border:'1px solid #e4e6ef',borderRadius:7,zIndex:300,maxHeight:220,overflowY:'auto',
      minWidth:200,boxShadow:'0 6px 20px rgba(0,0,0,.12)',fontSize:11.5}},
      filtered.length===0
        ?ce('div',{style:{padding:'8px 12px',color:'#9ca3af'}}, 'No results')
        :filtered.map(function(o){
          return ce('div',{key:o.value,
            onMouseDown:function(e){e.preventDefault();onChange(o.value);setOpen(false);setQuery('');},
            style:{padding:'7px 12px',cursor:'pointer',
              background:o.value===value?'#eff6ff':'transparent',
              color:o.value===value?'#2563eb':'#374151',
              fontWeight:o.value===value?600:400}
          },o.label);
        })
    )
  );
}

/* ═══════════════════════════════════════════════════════════════════
 *  TAB 1 — ORGANIC GENERATION
 * ═══════════════════════════════════════════════════════════════════ */
function OrganicGenTab(){
  var rows=ORG_ROWS;
  var[selYear,setSelYear]=useState('All');
  var[selState,setSelState]=useState('All');
  var[expanded,setExpanded]=useState({});

  var allMonths=useMemo(function(){var s=new Set();rows.forEach(function(r){if(r.month)s.add(r.month);});return Array.from(s).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(b)-moKey(a);});},[]);
  var allStates=useMemo(function(){var s=new Set();rows.forEach(function(r){s.add(r.state);});return Array.from(s).sort();},[]);
  var years=useMemo(function(){var s=new Set();allMonths.forEach(function(m){var p=m.match(/(\w+)'(\d+)/);if(p)s.add('20'+p[2]);});return Array.from(s).sort().reverse();},[allMonths]);

  var filtMos=useMemo(function(){
    if(selYear==='All')return allMonths;
    return allMonths.filter(function(m){var p=m.match(/(\w+)'(\d+)/);return p&&'20'+p[2]===selYear;});
  },[selYear,allMonths]);

  /* state → model → month → generation */
  var stateModelAgg=useMemo(function(){
    var o={};
    rows.forEach(function(r){
      if(!o[r.state])o[r.state]={};
      if(!o[r.state][r.model])o[r.state][r.model]={};
      o[r.state][r.model][r.month]=(o[r.state][r.model][r.month]||0)+r.generation;
    });
    return o;
  },[]);

  /* state → month → total across models */
  var stateTotals=useMemo(function(){
    var o={};
    allStates.forEach(function(st){
      o[st]={};
      var stData=stateModelAgg[st]||{};
      filtMos.forEach(function(mo){
        o[st][mo]=Object.values(stData).reduce(function(s,mData){return s+(mData[mo]||0);},0);
      });
    });
    return o;
  },[allStates,filtMos,stateModelAgg]);

  /* which states to render in the grid */
  var displayStates=useMemo(function(){
    return selState==='All'?allStates:[selState];
  },[selState,allStates]);

  /* grand total per month (respects state filter) */
  var grandTotals=useMemo(function(){
    var o={};
    filtMos.forEach(function(mo){
      o[mo]=displayStates.reduce(function(s,st){return s+((stateTotals[st]&&stateTotals[st][mo])||0);},0);
    });
    return o;
  },[filtMos,displayStates,stateTotals]);

  var totalGen=useMemo(function(){return rows.reduce(function(s,r){return s+r.generation;},0);},[]);

  var stateOptions=useMemo(function(){
    return [{value:'All',label:'All States'},...allStates.map(function(s){return{value:s,label:s};})];
  },[allStates]);

  function toggleState(st){setExpanded(function(prev){var n=Object.assign({},prev);n[st]=!n[st];return n;});}

  return ce('div',{className:'fade-up'},
    ce('div',{className:'stat-bar'},
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'Total Organic Leads'),ce('div',{className:'stat-val'},Nfw(totalGen))),
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'States'),ce('div',{className:'stat-val'},allStates.length)),
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'Months'),ce('div',{className:'stat-val'},allMonths.length)),
      ce('div',{className:'data-label'},'✓ TVS Organic Unique Generation')
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Organic Generation Matrix — State × Model × Month'),

        ce('div',{className:'filter-row',style:{gap:6}},

/* ═══════════════════════════════════════════════════════════════════
 *  TAB 4 — MODEL RETAIL ENGINE (Prediction)
 * ═══════════════════════════════════════════════════════════════════ */
function RetailEngineTab(){
  var[selYear, setSelYear] =useState('All');
  var[selState,setSelState]=useState('All');
  var[selModel,setSelModel]=useState('All');
  var[expandedPredStates,setExpandedPredStates]=useState({});
  var chartRef1=useRef(null);
  var chartRef2=useRef(null);

  var orgRows=ORG_ROWS;
  var vhnRows=VHN_ROWS;
  var wsRows =WS_ROWS;

  /* ── Aggregate raw rows ── */
  var vhnAgg=useMemo(function(){
    var o={};
    vhnRows.forEach(function(r){if(!o[r.state])o[r.state]={};o[r.state][r.month]=(o[r.state][r.month]||0)+r.retails;});
    var sts=Object.keys(o);var mos=new Set();sts.forEach(function(s){Object.keys(o[s]).forEach(function(m){mos.add(m);});});
    o['__ALL__']={};
    mos.forEach(function(m){o['__ALL__'][m]=sts.reduce(function(s,st){return s+(o[st][m]||0);},0);});
    return o;
  },[]);

  var wsAgg=useMemo(function(){
    var o={};
    wsRows.forEach(function(r){if(!o[r.model])o[r.model]={};o[r.model][r.month]=(o[r.model][r.month]||0)+r.wholesale;});
    return o;
  },[]);

  var orgAgg=useMemo(function(){
    var o={};
    orgRows.forEach(function(r){if(!o[r.month])o[r.month]={};o[r.month][r.model]=(o[r.month][r.model]||0)+r.generation;});
    return o;
  },[]);

  /* state → month → model → generation (for blended base per-state organic share) */
  var stOrgAgg=useMemo(function(){
    var o={};
    orgRows.forEach(function(r){
      if(!o[r.state])o[r.state]={};
      if(!o[r.state][r.month])o[r.state][r.month]={};
      o[r.state][r.month][r.model]=(o[r.state][r.month][r.model]||0)+r.generation;
    });
    return o;
  },[]);

  var allStates=useMemo(function(){return Object.keys(vhnAgg).filter(function(s){return s!=='__ALL__';}).sort();},[vhnAgg]);
  var allModels=useMemo(function(){var s={};Object.keys(wsAgg).forEach(function(m){s[m]=1;});ORG_ROWS.forEach(function(r){s[r.model]=1;});return Object.keys(s).sort();},[wsAgg]);

  var commonMonths=useMemo(function(){var vMos=new Set();vhnRows.forEach(function(r){if(r.month)vMos.add(r.month);});return Array.from(vMos).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(b)-moKey(a);});},[]);;

  var years=useMemo(function(){
    var s=new Set();commonMonths.forEach(function(m){var p=m.match(/(\w+)'(\d+)/);if(p)s.add('20'+p[2]);});
    return Array.from(s).sort().reverse();
  },[commonMonths]);

  var filtMos=useMemo(function(){
    var mos=selYear==='All'?commonMonths:commonMonths.filter(function(m){var p=m.match(/(\w+)'(\d+)/);return p&&'20'+p[2]===selYear;});
    return mos.slice(0,36);
  },[selYear,commonMonths]);

  var moTotalWS=useMemo(function(){
    var t={};
    commonMonths.forEach(function(mo){t[mo]=Object.values(wsAgg).reduce(function(s,m){return s+(m[mo]||0);},0);});
    return t;
  },[wsAgg,commonMonths]);

  var mosSorted=useMemo(function(){return commonMonths.slice().sort(function(a,b){return moKey(a)-moKey(b);});},[commonMonths]);

  function predictCell(st,model,mo){
    var stateRetail=(vhnAgg[st]||{})[mo]||0;
    var modelWS=(wsAgg[model]||{})[mo]||0;
    var totalWS=moTotalWS[mo]||1;
    var wsShare=modelWS/totalWS;

    /* Blended share: 60% pan-India WS + 40% state-specific organic mix */
    var stMoOrg=(stOrgAgg[st]&&stOrgAgg[st][mo])?stOrgAgg[st][mo]:{};
    var stMoOrgTotal=Object.values(stMoOrg).reduce(function(s,v){return s+v;},0);
    var panOrgTotal=Object.values(orgAgg[mo]||{}).reduce(function(s,v){return s+v;},0);var panOrgShare=panOrgTotal>0?((orgAgg[mo]||{})[model]||0)/panOrgTotal:0;var stOrgShare=stMoOrgTotal>0?((stMoOrg[model]||0)/stMoOrgTotal):(wsShare>0?0.70*wsShare+0.30*panOrgShare:panOrgShare);
    var blendedShare=wsShare>0?(0.70*wsShare+0.30*panOrgShare):panOrgShare;

    var base=stateRetail*blendedShare;
    if(!base)return 0;

    /* 6-month lookback (more stable than 3-month) */
    var moIdx=mosSorted.indexOf(mo);
    var prev6=mosSorted.slice(Math.max(0,moIdx-6),moIdx);

    /* Signal formula: clamp01(0.5 + 0.5*(ratio-1))
       — perfectly centred at 0.5 when ratio=1 (no change)
       — rises to 1.0 at ratio=2, falls to 0.0 at ratio=0              */
    function sig(now,avg){return clamp01(0.5+0.5*(avg>0?now/avg-1:0));}

    /* State retail momentum */
    var avgSR=prev6.length?prev6.reduce(function(s,m){return s+((vhnAgg[st]||{})[m]||0);},0)/prev6.length:stateRetail;
    var stateSig=sig(stateRetail,avgSR);

    /* Organic demand */
    var genNow=(orgAgg[mo]||{})[model]||0;
    var avgGen=prev6.length?prev6.reduce(function(s,m){return s+((orgAgg[m]||{})[model]||0);},0)/prev6.length:genNow;
    var orgSig=sig(genNow,avgGen);

    /* Wholesale trend */
    var avgWS=prev6.length?prev6.reduce(function(s,m){return s+((wsAgg[model]||{})[m]||0);},0)/prev6.length:modelWS;
    var wsSig=sig(modelWS,avgWS);

    /* Seasonality: same-calendar-month avg vs overall avg */
    var moNum=MN.indexOf(mo.split("'")[0]);
    var sameHist=mosSorted.filter(function(m){return MN.indexOf(m.split("'")[0])===moNum&&m!==mo;});
    var avgSame=sameHist.length?sameHist.reduce(function(s,m){return s+((vhnAgg[st]||{})[m]||0);},0)/sameHist.length:stateRetail;
    var ovAvg=mosSorted.reduce(function(s,m){return s+((vhnAgg[st]||{})[m]||0);},0)/Math.max(mosSorted.length,1);
    var seasSig=sig(avgSame,ovAvg);

    /* Weights: 40% State · 25% Organic · 25% WS · 10% Seasonality
       Discount centred at 1.0, range [0.95, 1.05] → max ±5% from base */
    var combined=0.40*stateSig+0.25*orgSig+0.25*wsSig+0.10*seasSig;
    var discount=0.95+combined*0.10;
    return Math.max(0,Math.round(base*discount));
  }

  var predictions=useMemo(function(){
    if(!filtMos.length)return{};
    var st=selState==='All'?'__ALL__':selState;
    var mods=selModel==='All'?allModels:[selModel];
    var out={};
    mods.forEach(function(model){
      out[model]={};
      filtMos.forEach(function(mo){out[model][mo]=predictCell(st,model,mo);});
    });
    return out;
  },[selState,selModel,filtMos,vhnAgg,wsAgg,moTotalWS,allModels,mosSorted,orgAgg,stOrgAgg]);

  var statePreds=useMemo(function(){
    if(selModel==='All'||!filtMos.length)return{};
    var out={};
    allStates.forEach(function(st){
      out[st]={};
      filtMos.forEach(function(mo){out[st][mo]=predictCell(st,selModel,mo);});
    });
    return out;
  },[selModel,filtMos,allStates,vhnAgg,wsAgg,moTotalWS,mosSorted,orgAgg,stOrgAgg]);

  /* all states × all models predictions for the Prediction Grid */
  var allStatePreds=useMemo(function(){
    if(!filtMos.length)return{};
    var out={};
    allStates.forEach(function(st){
      out[st]={};
      allModels.forEach(function(model){
        out[st][model]={};
        filtMos.forEach(function(mo){out[st][model][mo]=predictCell(st,model,mo);});
      });
    });
    return out;
  },[allStates,allModels,filtMos,vhnAgg,wsAgg,moTotalWS,mosSorted,orgAgg,stOrgAgg]);

  var accRows=useMemo(function(){
    var st=selState==='All'?'__ALL__':selState;
    return filtMos.map(function(mo){
      var actual=(vhnAgg[st]||{})[mo]||0;
      var pred=Object.values(predictions).reduce(function(s,ms){return s+(ms[mo]||0);},0);
      var v=actual>0?(pred-actual)/actual*100:null;
      return{mo,actual,pred,v};
    });
  },[filtMos,selState,vhnAgg,predictions]);

  var kpiPred=filtMos.reduce(function(s,mo){return s+Object.values(predictions).reduce(function(ps,ms){return ps+(ms[mo]||0);},0);},0);
  var kpiActual=(function(){var st=selState==='All'?'__ALL__':selState;return filtMos.reduce(function(s,mo){return s+((vhnAgg[st]||{})[mo]||0);},0);})();
  var kpiVar=kpiActual>0?(kpiPred-kpiActual)/kpiActual*100:null;
  var kpiMods=Object.keys(predictions).filter(function(m){return filtMos.some(function(mo){return (predictions[m]||{})[mo]>0;});}).length;

  useEffect(function(){
    var rows1=accRows.slice().reverse();
    mkChart(chartRef1,'mre_c1',{type:'line',
      data:{labels:rows1.map(function(r){return r.mo;}),datasets:[
        {label:'Vaahan Actual',data:rows1.map(function(r){return r.actual;}),borderColor:'#2563eb',backgroundColor:'#2563eb18',borderWidth:2.5,tension:.3,pointRadius:3.5,fill:false,spanGaps:true},
        {label:'Predicted',data:rows1.map(function(r){return r.pred;}),borderColor:'#d97706',backgroundColor:'#d9770618',borderWidth:2.5,borderDash:[5,3],tension:.3,pointRadius:3.5,fill:false,spanGaps:true}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10}}},
          tooltip:{backgroundColor:'rgba(15,23,42,.9)',titleColor:'#f1f5f9',bodyColor:'#cbd5e1',padding:10,cornerRadius:8,
            callbacks:{label:function(ctx){return ctx.dataset.label+': '+Nfw(ctx.raw||0);}}}},
        scales:{
          x:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#64748b',font:{size:9},maxRotation:45,minRotation:45}},
          y:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#64748b',font:{size:10},callback:function(v){return v>=100000?(v/100000).toFixed(1)+'L':v>=1000?(v/1000).toFixed(0)+'K':v;}},
            title:{display:true,text:'Units',color:'#94a3b8',font:{size:9}}}
        }
      }
    });

    var top8=allModels.slice().sort(function(a,b){
      return Object.values(wsAgg[b]||{}).reduce(function(s,v){return s+v;},0)-
             Object.values(wsAgg[a]||{}).reduce(function(s,v){return s+v;},0);
    }).slice(0,8);
    var labels2=filtMos.slice().reverse();
    var C=['#2563eb','#d97706','#16a34a','#dc2626','#7c3aed','#0891b2','#db2777','#ea580c'];
    mkChart(chartRef2,'mre_c2',{type:'bar',
      data:{labels:labels2,datasets:top8.map(function(mod,i){return{
        label:mod,
        data:labels2.map(function(mo){return(predictions[mod]||{})[mo]||0;}),
        backgroundColor:C[i%C.length]+'aa',borderColor:C[i%C.length],borderWidth:1
      };})},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10}}},
          tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+Nfw(ctx.raw||0);}}}},
        scales:{
          x:{stacked:true,grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#64748b',font:{size:9},maxRotation:45,minRotation:45}},
          y:{stacked:true,grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#64748b',font:{size:10},callback:function(v){return v>=100000?(v/100000).toFixed(1)+'L':v>=1000?(v/1000).toFixed(0)+'K':v;}}}
        }
      }
    });
    return function(){
      if(chartRef1.current){try{chartRef1.current.destroy();}catch(e){}chartRef1.current=null;}
      if(chartRef2.current){try{chartRef2.current.destroy();}catch(e){}chartRef2.current=null;}
    };
  },[accRows,predictions,allModels,filtMos,wsAgg]);

  function exportPredCSV(){
    var mods=selModel==='All'?allModels:[selModel];
    var predStates=selState==='All'?allStates:[selState];
    var header=['State','Model'].concat(filtMos.slice()).concat(['Total']);
    var csvRows=[header];
    predStates.forEach(function(st){
      var stPredTot=filtMos.reduce(function(s,mo){
        return s+mods.reduce(function(ms,model){return ms+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);
      },0);
      if(!stPredTot)return;
      var stRow=[st,'State Total'];
      filtMos.forEach(function(mo){
        stRow.push(mods.reduce(function(s,model){return s+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0));
      });
      stRow.push(stPredTot);
      csvRows.push(stRow);
      mods.forEach(function(model){
        var mTot=filtMos.reduce(function(s,mo){return s+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);
        if(!mTot)return;
        var mRow=[st,model];
        filtMos.forEach(function(mo){mRow.push((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);});
        mRow.push(mTot);
        csvRows.push(mRow);
      });
    });
    var grandRow=['Grand Total',''];
    var grandTot=0;
    filtMos.forEach(function(mo){
      var v=predStates.reduce(function(s,st){return s+mods.reduce(function(ms,model){return ms+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);},0);
      grandRow.push(v); grandTot+=v;
    });
    grandRow.push(grandTot);
    csvRows.push(grandRow);
    var csv=csvRows.map(function(row){
      return row.map(function(cell){
        var s=String(cell);
        if(s.indexOf(',')!==-1||s.indexOf('"')!==-1)s='"'+s.replace(/"/g,'""')+'"';
        return s;
      }).join(',');
    }).join('\r\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='TVS_Prediction_Grid_'+(selState==='All'?'PanIndia':selState.replace(/\s+/g,'_'))+'_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  return ce('div',{className:'fade-up'},

    ce('div',{className:'card',style:{padding:'12px 16px'}},
      ce('div',{className:'filter-row',style:{gap:12}},
        ce('span',{className:'filter-label'},'Filters'),
        ce(FilterSel,{label:'Year',value:selYear,onChange:setSelYear,
          options:[{value:'All',label:'All Years'},...years.map(function(y){return{value:y,label:y};})]}),
        ce(FilterSel,{label:'State',value:selState,onChange:setSelState,
          options:[{value:'All',label:'All States (Pan India)'},...allStates.map(function(s){return{value:s,label:s};})]}),
        ce(FilterSel,{label:'Model',value:selModel,onChange:setSelModel,
          options:[{value:'All',label:'All Models'},...allModels.map(function(m){return{value:m,label:m};})]}),
        ce('div',{style:{fontSize:11,color:'#94a3b8',marginLeft:'auto',flexShrink:0}},
          commonMonths.length+' months · '+allModels.length+' models · '+allStates.length+' states · ✓ All signals active')
      )
    ),

    ce('div',{className:'signal-row'},
      ce('span',{style:{fontWeight:600,color:'#374151'}},'Prediction Signals:'),
      ce('span',{className:'sig-item'},ce('span',{className:'sig-dot',style:{background:'#2563eb'}}),ce('b',null,'40%'),' State Momentum'),
      ce('span',{className:'sig-item'},ce('span',{className:'sig-dot',style:{background:'#16a34a'}}),ce('b',null,'25%'),' Organic Demand'),
      ce('span',{className:'sig-item'},ce('span',{className:'sig-dot',style:{background:'#d97706'}}),ce('b',null,'25%'),' Wholesale Trend'),
      ce('span',{className:'sig-item'},ce('span',{className:'sig-dot',style:{background:'#7c3aed'}}),ce('b',null,'10%'),' Seasonality'),
      ce('span',{style:{color:'#94a3b8',fontSize:10.5}},'| Base: 70% WS share + 30% Pan Organic â€” Discount: 0.95-1.05')
    ),

    ce('div',{className:'kpi-grid'},
      ce('div',{className:'kpi-card',style:{borderTopColor:'#d97706'}},
        ce('div',{className:'kpi-label'},'Total Predicted'),
        ce('div',{className:'kpi-value',style:{fontSize:20}},Nfw(kpiPred)),
        ce('div',{className:'kpi-sub'},(selModel==='All'?'All models':selModel)+' · '+filtMos.length+' months')
      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:'#2563eb'}},
        ce('div',{className:'kpi-label'},'Vaahan Actual'),
        ce('div',{className:'kpi-value',style:{fontSize:20}},Nfw(kpiActual)),
        ce('div',{className:'kpi-sub'},selState==='All'?'Pan India':selState)
      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:kpiVar!==null&&kpiVar<-10?'#dc2626':'#16a34a'}},
        ce('div',{className:'kpi-label'},'Variance (Pred vs Actual)'),
        ce('div',{className:'kpi-value',style:{fontSize:20,color:kpiVar===null?'#9ca3af':kpiVar<-10?'#dc2626':kpiVar<-5?'#d97706':'#16a34a'}},
          kpiVar!==null?(kpiVar>0?'+':'')+kpiVar.toFixed(1)+'%':'—'),
        ce('div',{className:'kpi-sub'},'negative = under-prediction (conservative)')
      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:'#7c3aed'}},
        ce('div',{className:'kpi-label'},'Models Active'),
        ce('div',{className:'kpi-value',style:{fontSize:20}},kpiMods),
        ce('div',{className:'kpi-sub'},'with non-zero predictions')
      )
    ),

    filtMos.length>0&&ce('div',{className:'chart-pair'},
      ce('div',{className:'card',style:{marginBottom:0}},
        ce('div',{className:'card-title'},'Actual vs Predicted · '+(selState==='All'?'Pan India':selState)),
        ce('div',{className:'chart-box'},ce('canvas',{id:'mre_c1'}))
      ),
      ce('div',{className:'card',style:{marginBottom:0}},
        ce('div',{className:'card-title'},'Predicted by Model · Top 8 by WS Volume'),
        ce('div',{className:'chart-box'},ce('canvas',{id:'mre_c2'}))
      )
    ),

    filtMos.length>0&&Object.keys(allStatePreds).length>0&&ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title',style:{marginBottom:0}},'Prediction Grid - State x Month - TVS Models'),
        ce('button',{onClick:exportPredCSV,style:{marginLeft:'auto',padding:'6px 16px',border:'1.5px solid #2563eb',borderRadius:6,fontSize:11,fontWeight:600,background:'#eff6ff',color:'#2563eb',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}},'⬇ Export CSV')
      ),
      ce('div',{style:{fontSize:11,color:'#94a3b8',margin:'8px 0 10px'}},
        'Click any state row to expand/collapse model-level predictions. State total = sum of all model predictions for that state.'),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc'},'State / Model'),
            filtMos.map(function(mo){return ce('th',{key:mo},mo);}),
            ce('th',null,'Total')
          )),
          ce('tbody',null,
            (function(){
              var out=[];
              var mods=selModel==='All'?allModels:[selModel];
              var predStates=selState==='All'?allStates:[selState];
              predStates.forEach(function(st){
                var stPredTot=filtMos.reduce(function(s,mo){
                  return s+mods.reduce(function(ms,model){return ms+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);
                },0);
                if(!stPredTot)return;
                var isExp=!!(expandedPredStates[st]||(selState!=='All'));
                out.push(ce('tr',{key:st,style:{background:'#f1f5f9',cursor:'pointer'},onClick:function(){setExpandedPredStates(function(prev){var n=Object.assign({},prev);n[st]=!n[st];return n;});}},
                  ce('td',{className:'lc',style:{background:'#f1f5f9',fontWeight:700,color:'#1e293b'}},
                    ce('span',{style:{marginRight:6,fontSize:10,userSelect:'none'}},(isExp?'▼':'▶')),st),
                  filtMos.map(function(mo){
                    var v=mods.reduce(function(s,model){return s+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);
                    return ce('td',{key:mo,style:{fontWeight:600,color:v?'#1e293b':'#d1d5db'}},v?Nf(v):'-');
                  }),
                  ce('td',{style:{fontWeight:700,color:'#d97706'}},Nf(stPredTot))
                ));
                if(isExp){
                  mods.forEach(function(model,mi){
                    var mTot=filtMos.reduce(function(s,mo){return s+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);
                    if(!mTot)return;
                    out.push(ce('tr',{key:st+'_'+model,style:{background:mi%2===0?'#fff':'#fafafa'}},
                      ce('td',{className:'lc',style:{background:mi%2===0?'#fff':'#fafafa',paddingLeft:28,color:'#475569',fontStyle:'italic'}},model),
                      filtMos.map(function(mo){var v=(allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0;
                        return ce('td',{key:mo,style:{color:v?'inherit':'#d1d5db'}},v?Nf(v):'-');}),
                      ce('td',{style:{color:'#475569'}},mTot?Nf(mTot):'-')
                    ));
                  });
                }
              });
              return out;
            })()
          ),
          ce('tfoot',null,ce('tr',null,
            ce('td',{className:'lc'},'Grand Total'),
            filtMos.map(function(mo){
              var mods=selModel==='All'?allModels:[selModel];
              var pSts=selState==='All'?allStates:[selState];
              var tot=pSts.reduce(function(s,st){return s+mods.reduce(function(ms,model){return ms+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);},0);
              return ce('td',{key:mo},Nfw(tot));
            }),
            ce('td',null,Nfw((function(){
              var mods=selModel==='All'?allModels:[selModel];
              var pSts=selState==='All'?allStates:[selState];
              return filtMos.reduce(function(s,mo){return s+pSts.reduce(function(ss,st){return ss+mods.reduce(function(ms,model){return ms+((allStatePreds[st]&&allStatePreds[st][model]&&allStatePreds[st][model][mo])||0);},0);},0);},0);
            })()))
          ))
        )
      )
    ),

    filtMos.length>1&&ce('div',{className:'card'},
      ce('div',{className:'card-title'},'State Momentum Overview — Vaahan Retails MoM % · Pan India'),
      ce('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:10}},
        'Month-on-month growth in state retails (positive = improving momentum). Used as Signal 1 in prediction.'),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc'},'State'),
            filtMos.slice(0,12).map(function(mo){return ce('th',{key:mo},mo);}),
            ce('th',null,'Trend')
          )),
          ce('tbody',null,
            (selState==='All'?allStates:[selState]).map(function(st,ri){
              var bg=ri%2===0?'#fff':'#f8fafc';
              var vals=filtMos.slice(0,12).map(function(mo){return(vhnAgg[st]||{})[mo]||0;});
              var hasAny=vals.some(function(v){return v>0;});if(!hasAny)return null;
              var moms=vals.map(function(v,i){
                if(i===vals.length-1)return null;
                var prev=vals[i+1];
                return prev>0?(v-prev)/prev*100:null;
              });
              var avgMom=moms.filter(function(m){return m!==null;});
              var trend=avgMom.length?avgMom.reduce(function(s,v){return s+v;},0)/avgMom.length:0;
              return ce('tr',{key:st,style:{background:bg}},
                ce('td',{className:'lc',style:{background:bg}},st),
                vals.map(function(v,i){
                  var mom=moms[i];
                  var cellBg=mom===null?undefined:mom>5?'rgba(22,163,74,.08)':mom<-5?'rgba(220,38,38,.08)':undefined;
                  return ce('td',{key:i,style:{background:cellBg}},
                    v?Nf(v):'-',
                    mom!==null&&ce('div',{style:{fontSize:9,color:mom>5?'#16a34a':mom<-5?'#dc2626':'#9ca3af',fontFamily:'inherit',lineHeight:1}},
                      (mom>0?'+':'')+mom.toFixed(1)+'%')
                  );
                }),
                ce('td',{style:{fontWeight:600,color:trend>0?'#16a34a':trend<0?'#dc2626':'#9ca3af'}},
                  (trend>0?'↑ +':'↓ ')+trend.toFixed(1)+'%')
              );
            }).filter(Boolean)
          )
        )
      )
    ),

    filtMos.length>0&&ce('div',{className:'card'},
      ce('div',{className:'card-title'},'Month-Wise Accuracy — Actual vs Predicted'),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc',style:{minWidth:90}},'Month'),
            ce('th',null,'Vaahan Actual'),
            ce('th',null,'Predicted'),
            ce('th',null,'Difference'),
            ce('th',null,'Variance %'),
            ce('th',null,'Status')
          )),
          ce('tbody',null,accRows.map(function(r,ri){
            var bg=ri%2===0?'#fff':'#f8fafc';
            var vc=r.v===null?'#9ca3af':r.v<-10?'#dc2626':r.v<-5?'#d97706':'#166534';
            var status=r.v===null?'—':r.v<-10?'⚠ Review':r.v<-5?'◑ Acceptable':'✓ On Track';
            var diff=r.pred-r.actual;
            return ce('tr',{key:r.mo,style:{background:bg}},
              ce('td',{className:'lc',style:{background:bg,fontWeight:600}},r.mo),
              ce('td',null,Nfw(r.actual)),
              ce('td',null,Nfw(r.pred)),
              ce('td',{style:{color:diff<0?'#dc2626':'#16a34a'}},diff?((diff>0?'+':'')+Nfw(diff)):'-'),
              ce('td',{style:{color:vc,fontWeight:600}},r.v!==null?(r.v>0?'+':'')+r.v.toFixed(1)+'%':'—'),
              ce('td',{style:{color:vc,fontWeight:500}},status)
            );
          })),
          ce('tfoot',null,ce('tr',null,
            ce('td',{className:'lc'},'Total'),
            ce('td',null,Nfw(kpiActual)),
            ce('td',null,Nfw(kpiPred)),
            ce('td',{style:{color:kpiPred<kpiActual?'#dc2626':'#16a34a',fontWeight:700}},
              kpiPred-kpiActual?(((kpiPred-kpiActual)>0?'+':'')+Nfw(kpiPred-kpiActual)):'-'),
            ce('td',{style:{fontWeight:700,color:kpiVar!==null?(kpiVar<-10?'#dc2626':kpiVar<-5?'#d97706':'#166534'):'#6b7280'}},
              kpiVar!==null?(kpiVar>0?'+':'')+kpiVar.toFixed(1)+'%':'—'),
            ce('td',null,'')
          ))
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════════
 *  MAIN APP
 * ═══════════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'engine',    label:'Model Retail Engine', icon:'🔮'},
  {id:'organic',   label:'Organic Generation',  icon:'📊'},
  {id:'vaahan',    label:'State Wise Retails',  icon:'🗺️'},
  {id:'wholesale', label:'Model Wise Wholesale',icon:'📦'},
];

function App(){
  var[tab,setTab]=useState('engine');

  function renderTab(){
    if(tab==='organic')   return ce(OrganicGenTab,null);
    if(tab==='vaahan')    return ce(VaahanRetailTab,null);
    if(tab==='wholesale') return ce(WholesaleTab,null);
    if(tab==='engine')    return ce(RetailEngineTab,null);
    return null;
  }

  return ce('div',null,
    ce('header',{className:'app-header'},
      ce('div',{className:'header-left'},
        ce('div',{className:'app-logo',style:{fontSize:11,fontWeight:900,letterSpacing:'-0.05em'}},'TVS'),
        ce('div',null,
          ce('div',{className:'app-title'},'TVS Retail Engine'),
          ce('div',{className:'app-sub'},'Retail Prediction Engine · v'+VERSION+' · TVS Motor Company Ltd')
        )
      ),
      ce('div',{style:{display:'flex',alignItems:'center',gap:10}},
        ce('div',{className:'badge tag-green'},'✓ Organic Data Active'),
        ce('div',{className:'badge tag-amber'},"Data: Apr'24 – Apr'26"),
        ce('div',{style:{fontSize:11,color:'#6b7280'}},'CDN: React 18 · Chart.js 4')
      )
    ),
    ce('div',{className:'main-content'},
      ce('div',{className:'subtab-nav'},
        TABS.map(function(t){
          return ce('button',{key:t.id,className:'subtab-btn'+(tab===t.id?' active':''),onClick:function(){setTab(t.id);}},
            t.icon+' '+t.label);
        })
      ),
      renderTab()
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(App,null));
</script>
</body>
</html>
